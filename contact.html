<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZayFBS - Contact</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Borel&family=Caprasimo&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <h1>ZAYFBS</h1>
      <div class="logo-left">
        <img src="img/logo4.png" alt="ZayFBS Logo" />
      </div>

      <nav class="nav">
        <ul>
          <li><a href="accueil.html">ACCUEIL</a></li>
          <li><a href="Produits.html">PRODUITS</a></li>
          <li><a href="contact.html" class="active">CONTACT</a></li>
        </ul>
      </nav>

      <div class="nav-right">
        <button id="cartBtn">
          <i class="fa-solid fa-cart-shopping"></i> PANIER
          <span class="cart-badge" id="cartBadge"></span>
        </button>
      </div>
    </header>

    <!-- PANIER OVERLAY -->
    <div class="panier-overlay" id="panierOverlay"></div>

    <!-- PANIER SIDEBAR -->
    <div id="panierBox" class="panier-box">
      <div class="panier-header">
        <h2>🛒 Mon Panier</h2>
        <button class="panier-close" id="panierClose">✕</button>
      </div>
      <div class="panier-items" id="panierContainer"></div>
      <div class="panier-footer">
        <div class="panier-total">
          <span>Total</span>
          <span id="panierTotal">0 DH</span>
        </div>
        <button class="btn-commander">Commander</button>
      </div>
    </div>

    <!-- CONTACT PAGE -->
    <main class="contact-page">
      <h2>Contactez-Nous</h2>

      <div class="contact-container">
        <div class="contact-info">
          <h3><i class="fa-solid fa-location-dot"></i> Notre Adresse</h3>
          <p>Fquih Ben Salah, Région Béni Mellal-Khénifra, Maroc</p>

          <h3><i class="fa-solid fa-phone"></i> Téléphone</h3>
          <p>+212 5XX-XXXXXX</p>

          <h3><i class="fa-solid fa-envelope"></i> Email</h3>
          <p>Laila@zayfbs.ma</p>
        </div>

        <form
          class="contact-form"
          id="contactForm"
          onsubmit="return envoyerMessage(event);"
        >
          <div class="field">
            <label>Nom complet</label>
            <input type="text" id="nom" required placeholder="Votre nom" />
          </div>
          <div class="field">
            <label>Email</label>
            <input
              type="email"
              id="email"
              required
              placeholder="votre@email.com"
            />
          </div>
          <div class="field">
            <label>Message</label>
            <textarea
              id="message"
              required
              placeholder="Votre message..."
              rows="5"
            ></textarea>
          </div>
          <button type="submit" class="btn-submit">
            <i class="fa-solid fa-paper-plane"></i> Envoyer
          </button>
        </form>
      </div>
    </main>

    <footer>
      <p><i class="fa-solid fa-location-dot"></i> Fquih Ben Salah, Maroc</p>
      <p>&copy; 2026 ZayFBS - Tous droits réservés</p>
    </footer>

    <script src="script.js"></script>
    <script>
      function envoyerMessage(e) {
        e.preventDefault();
        alert("Message envoyé ! Merci de nous avoir contactés.");
        e.target.reset();
        return false;
      }
    </script>
  </body>
</html>
