<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZayFBS - Produits</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Borel&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Caprasimo&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <h1>ZAYFBS</h1>
      <div class="logo-left">
        <img src="img/logo4.png" alt="ZayFBS" />
      </div>

      <nav class="nav">
        <ul>
          <li><a href="accueil.html">ACCUEIL</a></li>
          <li><a href="Produits.html" class="active">PRODUITS</a></li>
          <li><a href="contact.html">CONTACT</a></li>
        </ul>
      </nav>

      <div class="nav-right">
        <button id="cartBtn">
          <i class="fa-solid fa-cart-shopping"></i> PANIER
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
      </div>
    </header>

    <div class="panier-overlay" id="panierOverlay"></div>

    <div id="panierBox" class="panier-box">
      <div class="panier-header">
        <h2>🛒 Mon Panier</h2>
        <button class="panier-close" id="panierClose">✕</button>
      </div>
      <div class="panier-items" id="panierContainer"></div>
      <div class="panier-footer">
        <div class="panier-total">
          <span>Total</span>
          <span id="panierTotal">0 DH</span>
        </div>
        <button class="btn-commander" id="commander">Commander</button>
      </div>
    </div>

    <div class="add-btn-container">
      <button id="showFormBtn">+ Ajouter produit</button>
    </div>

    <div class="form-ajout" id="formAjout">
      <input type="file" id="image" accept="image/*" />
      <img
        id="preview"
        style="
          display: none;
          width: 100%;
          border-radius: 10px;
          max-height: 200px;
          object-fit: cover;
        "
      />
      <input type="text" id="titre" placeholder="Titre du produit" />
      <textarea id="description" placeholder="Description" rows="3"></textarea>
      <input type="number" id="prix" placeholder="Prix (DH)" />
      <div class="buttons">
        <button id="btnAdd">✔ Ajouter</button>
        <button id="btnCancel">✖ Annuler</button>
      </div>
    </div>

    <div id="cardsContainer" class="cards"></div>

    <footer>
      <p>ZayFBS _ Tous droits réservés</p>
      <p>Contact _ FKIH BEN SALAH</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
